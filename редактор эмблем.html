<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SVG Emblem Editor</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .canvas-area {
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
        }
        canvas {
            background: #000;
            border: 1px solid #555;
            cursor: crosshair;
        }
        .controls {
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
        }
        button {
            background: #3e2723;
            color: #fff;
            border: 1px solid #5d4037;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border-radius: 4px;
        }
        button:hover {
            background: #5d4037;
        }
        button.danger {
            background: #8b0000;
            border-color: #aa0000;
        }
        button.success {
            background: #006400;
            border-color: #008000;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            color: #0f0;
            border: 1px solid #444;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 10px;
        }
        .info {
            margin-top: 10px;
            padding: 10px;
            background: #333;
            border-radius: 4px;
            font-size: 12px;
        }
        .vertex-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .vertex-item {
            padding: 5px;
            background: #333;
            margin: 2px 0;
            border-radius: 3px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }
        .vertex-item:hover {
            background: #444;
        }
        h1, h2 {
            color: #ff5722;
            text-shadow: 0 0 10px #ff5722;
        }
    </style>
</head>
<body>
    <h1>🎨 SVG Emblem Editor</h1>
    <div class="container">
        <div class="canvas-area">
            <h2>Холст (клик для добавления вершин)</h2>
            <canvas id="editorCanvas" width="500" height="500"></canvas>
            <div class="info">
                <strong>Управление:</strong><br>
                • ЛКМ — добавить вершину<br>
                • ПКМ — удалить последнюю вершину<br>
                • Двойной клик — замкнуть путь<br>
                • Ctrl+Z — отменить последнюю вершину
            </div>
        </div>
        <div class="controls">
            <h2>Инструменты</h2>
            <button onclick="clearCanvas()" class="danger">🗑️ Очистить</button>
            <button onclick="undoLast()" class="danger">↩️ Отменить</button>
            <button onclick="closePath()" class="success">🔒 Замкнуть путь</button>
            <button onclick="exportSVG()" class="success">📤 Экспорт SVG</button>
            <button onclick="copyToClipboard()" class="success">📋 Копировать код</button>
            
            <h3>Вершины:</h3>
            <div class="vertex-list" id="vertexList"></div>
            
            <h3>Экспорт:</h3>
            <textarea id="exportOutput" placeholder="Здесь появится SVG код..."></textarea>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const vertexList = document.getElementById('vertexList');
        const exportOutput = document.getElementById('exportOutput');
        
        let vertices = [];
        let isClosed = false;
        let history = [];
        
        // Настройки отображения
        const gridSize = 50;
        const snapToGrid = true;
        const snapDistance = 10;
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Сетка
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Оси
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
            
            // Путь
            if (vertices.length > 0) {
                ctx.strokeStyle = '#00e676';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(vertices[0].x, vertices[0].y);
                for (let i = 1; i < vertices.length; i++) {
                    ctx.lineTo(vertices[i].x, vertices[i].y);
                }
                if (isClosed) {
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(0, 230, 118, 0.2)';
                    ctx.fill();
                }
                ctx.stroke();
            }
            
            // Вершины
            vertices.forEach((v, i) => {
                ctx.fillStyle = i === 0 ? '#ff5722' : '#00e676';
                ctx.beginPath();
                ctx.arc(v.x, v.y, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // Номер вершины
                ctx.fillStyle = '#fff';
                ctx.font = '10px Courier New';
                ctx.fillText(i, v.x + 8, v.y - 8);
            });
            
            updateVertexList();
        }
        
        function snapToGridPoint(x, y) {
            if (!snapToGrid) return { x, y };
            
            const snappedX = Math.round(x / gridSize) * gridSize;
            const snappedY = Math.round(y / gridSize) * gridSize;
            
            if (Math.abs(x - snappedX) < snapDistance && Math.abs(y - snappedY) < snapDistance) {
                return { x: snappedX, y: snappedY };
            }
            return { x, y };
        }
        
        canvas.addEventListener('click', (e) => {
            if (isClosed) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const snapped = snapToGridPoint(x, y);
            
            history.push([...vertices]);
            vertices.push(snapped);
            draw();
        });
        
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (vertices.length > 0) {
                history.push([...vertices]);
                vertices.pop();
                draw();
            }
        });
        
        canvas.addEventListener('dblclick', () => {
            closePath();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                undoLast();
            }
        });
        
        function undoLast() {
            if (history.length > 0) {
                vertices = history.pop();
                isClosed = false;
                draw();
            }
        }
        
        function clearCanvas() {
            vertices = [];
            isClosed = false;
            history = [];
            exportOutput.value = '';
            draw();
        }
        
        function closePath() {
            if (vertices.length >= 3) {
                isClosed = true;
                draw();
            }
        }
        
        function updateVertexList() {
            vertexList.innerHTML = vertices.map((v, i) => 
                `<div class="vertex-item">
                    <span>#${i}: (${Math.round(v.x)}, ${Math.round(v.y)})</span>
                    <span style="color: #888;">${Math.round(v.x / gridSize)}, ${Math.round(v.y / gridSize)}</span>
                </div>`
            ).join('');
        }
        
        function exportSVG() {
            if (vertices.length < 3) {
                alert('Нужно минимум 3 вершины!');
                return;
            }
            
            // Нормализуем координаты для viewBox 0 0 24 24
            const minX = Math.min(...vertices.map(v => v.x));
            const maxX = Math.max(...vertices.map(v => v.x));
            const minY = Math.min(...vertices.map(v => v.y));
            const maxY = Math.max(...vertices.map(v => v.y));
            
            const width = maxX - minX || 1;
            const height = maxY - minY || 1;
            const scale = 20 / Math.max(width, height);
            
            const pathData = vertices.map((v, i) => {
                const x = ((v.x - minX) * scale + 2).toFixed(2);
                const y = ((v.y - minY) * scale + 2).toFixed(2);
                return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
            }).join(' ') + (isClosed ? ' Z' : '');
            
            const svg = `<svg viewBox="0 0 24 24"><path d="${pathData}"/></svg>`;
            
            exportOutput.value = svg;
        }
        
        function copyToClipboard() {
            exportOutput.select();
            document.execCommand('copy');
            alert('Скопировано в буфер!');
        }
        
        // Инициализация
        draw();
    </script>
</body>
</html>
