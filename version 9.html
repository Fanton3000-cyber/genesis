<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Project: Rusty Core - Virtual Stars Border</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: #8c8c8c;
            user-select: none;
        }

        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 50% 50%, #2a2a2a 0%, #050505 100%),
                repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, #0f0f0f 4px, #0f0f0f 6px);
        }
        .background::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .game-interface {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 650px;
            z-index: 10;
            background-color: #141414;
            border: 4px solid #3e2723;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                inset 0 0 50px rgba(0, 0, 0, 0.9),
                0 0 10px rgba(62, 39, 35, 0.5);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .bolt {
            position: absolute; width: 12px; height: 12px;
            background: radial-gradient(circle, #5d4037 30%, #1a1a1a 100%);
            border-radius: 50%; border: 1px solid #222;
        }
        .tl { top: -8px; left: -8px; } .tr { top: -8px; right: -8px; }
        .bl { bottom: -8px; left: -8px; } .br { bottom: -8px; right: -8px; }

        .header {
            border-bottom: 2px solid #3e2723;
            padding-bottom: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 14px; color: #a1887f;
            text-shadow: 0 0 5px rgba(161, 136, 127, 0.3);
        }

        .status-light {
            width: 10px; height: 10px;
            background-color: #ff3d00;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #ff3d00;
            transition: all 0.5s ease;
        }
        .status-light.active {
            background-color: #00e676;
            box-shadow: 0 0 8px #00e676;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }

        #game-container {
            flex-grow: 1;
            background-color: #0b0e0b;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); 
            animation: led-pulse 4s infinite ease-in-out;
        }

        @keyframes led-pulse {
            0% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
            50% { box-shadow: inset 0 0 90px rgba(0, 255, 100, 0.1); }
            100% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
        }

        canvas {
            display: block; width: 100%; height: 100%;
        }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 5;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; text-align: center;
            cursor: pointer;
        }
        h1 { color: #d7ccc8; text-shadow: 0 0 10px #ff5722; font-size: 32px; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 14px; color: #888; max-width: 400px; line-height: 1.5; }
        .blink-text { margin-top: 30px; color: #ff5722; animation: blink 1s infinite; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-interface">
        <div class="bolt tl"></div><div class="bolt tr"></div>
        <div class="bolt bl"></div><div class="bolt br"></div>

        <div class="header">
            <span>System: <span id="sys-status" style="color: #ff5722;">OFFLINE</span></span>
            <span>Hull Integrity: <span id="hull-status">100%</span></span>
            <span>Status: <div id="status-light" class="status-light"></div></span>
        </div>

        <div id="game-container">
            <div class="vignette"></div>
            <canvas id="gameCanvas"></canvas>
            
            <div id="start-screen">
                <h1>Rusty Core</h1>
                <p>Навигационная система готова.<br>Сектора загружены. Враги обнаружены.</p>
                <div class="blink-text">[ НАЖМИ ПРОБЕЛ ИЛИ КЛИКНИ ]</div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            starCount: 28,
            virtualStarCount: 40, // Количество "мнимых" звёзд для границы
            minStarDistance: 90,
            maxConnections: 5,
            connectionRange: 200,
            boundaryMargin: 90, // Отступ для границы
            colors: {
                star: '#888',
                starActive: '#ff9800',
                line: '#444',
                sectorBorder: 'rgba(140, 140, 140, 0.4)',
                deepSpace: 'rgba(3, 5, 10, 0.95)',
                boundaryLine: 'rgba(120, 160, 200, 0.5)'
            }
        };

        class Star {
            constructor(id, x, y, isVirtual = false) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.isVirtual = isVirtual; // Флаг "мнимой" звезды
                this.connections = [];
                this.hasEnemy = false;
                this.isPlayer = false;
                this.sectorColor = '';
                this.voronoiCell = [];
                this.angle = Math.random() * Math.PI * 2;
            }
        }

        const state = {
            isRunning: false,
            stars: [], // Реальные звёзды
            virtualStars: [], // Мнимые звёзды (только для генерации границы)
            playerStarId: null,
            hull: 100,
            time: 0,
            bgStars: [],
            boundaryPolygon: []
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const statusLight = document.getElementById('status-light');
        const sysStatusText = document.getElementById('sys-status');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            generateBackgroundStars();
        }
        window.addEventListener('resize', resizeCanvas);

        function generateBackgroundStars() {
            state.bgStars = [];
            const count = 100;
            for (let i = 0; i < count; i++) {
                state.bgStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    alpha: 0.3 + Math.random() * 0.5,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        // --- Рисуем глубокий космос ---
        function drawDeepSpace() {
            // Рисуем тёмный фон поверх внешних областей
            ctx.save();
            
            // Путь для глубокого космоса (весь экран)
            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);
            
            // Вырезаем область исследованной зоны
            if (state.boundaryPolygon.length > 2) {
                ctx.moveTo(state.boundaryPolygon[0].x, state.boundaryPolygon[0].y);
                for (let i = 1; i < state.boundaryPolygon.length; i++) {
                    ctx.lineTo(state.boundaryPolygon[i].x, state.boundaryPolygon[i].y);
                }
                ctx.closePath();
            }
            
            // Заполняем только внешнюю область
            ctx.fillStyle = CONFIG.colors.deepSpace;
            ctx.fill('evenodd');
            ctx.restore();
            
            // Мерцающие звёзды в глубоком космосе
            state.bgStars.forEach(star => {
                const isOutside = !isPointInPolygon(star.x, star.y, state.boundaryPolygon);
                if (isOutside) {
                    const twinkle = 0.5 + 0.5 * Math.sin(state.time * 0.5 + star.twinkle);
                    ctx.fillStyle = `rgba(200, 220, 255, ${star.alpha * twinkle})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // Рисуем границу исследованной зоны
            if (state.boundaryPolygon.length > 2) {
                ctx.strokeStyle = CONFIG.colors.boundaryLine;
                ctx.lineWidth = 1.5;
                ctx.setLineDash([5, 4]);
                ctx.beginPath();
                ctx.moveTo(state.boundaryPolygon[0].x, state.boundaryPolygon[0].y);
                for (let i = 1; i < state.boundaryPolygon.length; i++) {
                    ctx.lineTo(state.boundaryPolygon[i].x, state.boundaryPolygon[i].y);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function isPointInPolygon(x, y, polygon) {
            if (polygon.length < 3) return true;
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                const intersect = ((yi > y) !== (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        // --- ДИАГРАММА ВОРОНОГО С МНИМЫМИ ЗВЁЗДАМИ ---
        function computeVoronoi() {
            const w = canvas.width;
            const h = canvas.height;
            
            // Объединяем реальные и мнимые звёзды для вычисления Вороного
            const allStars = [...state.stars, ...state.virtualStars];

            // 1. Инициализация ячеек
            allStars.forEach(star => {
                star.voronoiCell = [
                    {x: -10000, y: -10000},
                    {x: w + 10000, y: -10000},
                    {x: w + 10000, y: h + 10000},
                    {x: -10000, y: h + 10000}
                ];
            });

            // 2. Отсечение бисекторами (все звёзды влияют друг на друга)
            allStars.forEach(star => {
                allStars.forEach(other => {
                    if (star === other) return;
                    clipCellByBisector(star, other);
                });
            });

            // 3. Строим границу из ячеек мнимых звёзд
            buildBoundaryFromVirtualStars();
        }

        // Граница — это стык между реальными и мнимыми ячейками
        function buildBoundaryFromVirtualStars() {
            const boundaryPoints = [];
            
            // Собираем вершины ячеек мнимых звёзд
            state.virtualStars.forEach(vStar => {
                if (vStar.voronoiCell && vStar.voronoiCell.length >= 3) {
                    vStar.voronoiCell.forEach(point => {
                        // Проверяем, находится ли точка рядом с реальными звёздами
                        let nearRealStar = false;
                        for (let rStar of state.stars) {
                            const d = Math.sqrt(Math.pow(point.x - rStar.x, 2) + Math.pow(point.y - rStar.y, 2));
                            if (d < 150) { // Если близко к реальной звезде
                                nearRealStar = true;
                                break;
                            }
                        }
                        if (nearRealStar) {
                            boundaryPoints.push({x: point.x, y: point.y});
                        }
                    });
                }
            });

            // Сортируем точки по углу относительно центра
            if (boundaryPoints.length > 2) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                boundaryPoints.sort((a, b) => {
                    const angleA = Math.atan2(a.y - centerY, a.x - centerX);
                    const angleB = Math.atan2(b.y - centerY, b.x - centerX);
                    return angleA - angleB;
                });

                // Убираем дубликаты
                const unique = [];
                const minDist = 25;
                boundaryPoints.forEach(point => {
                    let tooClose = false;
                    for (let existing of unique) {
                        const d = Math.sqrt(Math.pow(point.x - existing.x, 2) + Math.pow(point.y - existing.y, 2));
                        if (d < minDist) {
                            tooClose = true;
                            break;
                        }
                    }
                    if (!tooClose) unique.push(point);
                });

                state.boundaryPolygon = unique;
            } else {
                // Если не получилось, создаём простую границу
                const m = CONFIG.boundaryMargin;
                state.boundaryPolygon = [
                    {x: m, y: m},
                    {x: canvas.width - m, y: m},
                    {x: canvas.width - m, y: canvas.height - m},
                    {x: m, y: canvas.height - m}
                ];
            }
        }

        function clipCellByBisector(star, other) {
            const midX = (star.x + other.x) / 2;
            const midY = (star.y + other.y) / 2;
            const nx = star.x - other.x;
            const ny = star.y - other.y;

            const newCell = [];
            const cell = star.voronoiCell;
            if (cell.length === 0) return;

            for (let i = 0; i < cell.length; i++) {
                const curr = cell[i];
                const next = cell[(i + 1) % cell.length];

                const currDist = (curr.x - midX) * nx + (curr.y - midY) * ny;
                const nextDist = (next.x - midX) * nx + (next.y - midY) * ny;
                const epsilon = 0.001;

                if (currDist >= -epsilon) {
                    newCell.push({x: curr.x, y: curr.y});
                }

                if ((currDist >= -epsilon && nextDist < -epsilon) || 
                    (currDist < -epsilon && nextDist >= -epsilon)) {
                    const t = currDist / (currDist - nextDist);
                    const intersectX = curr.x + t * (next.x - curr.x);
                    const intersectY = curr.y + t * (next.y - curr.y);
                    newCell.push({x: intersectX, y: intersectY});
                }
            }
            star.voronoiCell = newCell;
        }

        function generateMap() {
            try {
                state.stars = [];
                state.virtualStars = [];
                state.boundaryPolygon = [];
                const w = canvas.width;
                const h = canvas.height;
                const padding = CONFIG.boundaryMargin + 20;

                // Прозрачность секторов (для будущих фракций)
                const sectorColors = [
                    'rgba(90, 60, 50, 0.22)',
                    'rgba(50, 60, 90, 0.22)',
                    'rgba(50, 90, 60, 0.22)',
                    'rgba(90, 90, 50, 0.22)',
                    'rgba(90, 50, 50, 0.22)',
                    'rgba(60, 50, 90, 0.22)'
                ];

                // 1. Генерация РЕАЛЬНЫХ звёзд (внутри границы)
                let attempts = 0;
                while (state.stars.length < CONFIG.starCount && attempts < 3000) {
                    const x = Math.random() * (w - padding * 2) + padding;
                    const y = Math.random() * (h - padding * 2) + padding;
                    
                    let tooClose = false;
                    for (let star of state.stars) {
                        const dist = Math.sqrt(Math.pow(star.x - x, 2) + Math.pow(star.y - y, 2));
                        if (dist < CONFIG.minStarDistance) {
                            tooClose = true;
                            break;
                        }
                    }
                    if (!tooClose) {
                        const star = new Star(state.stars.length, x, y, false);
                        star.sectorColor = sectorColors[state.stars.length % sectorColors.length];
                        state.stars.push(star);
                    }
                    attempts++;
                }

                // 2. Генерация МНИМЫХ звёзд (вокруг границы, для формирования края)
                for (let i = 0; i < CONFIG.virtualStarCount; i++) {
                    const side = Math.floor(Math.random() * 4);
                    let x, y;
                    const spread = 50;
                    
                    switch(side) {
                        case 0: // Верх
                            x = Math.random() * w;
                            y = -spread - Math.random() * CONFIG.boundaryMargin;
                            break;
                        case 1: // Право
                            x = w + spread + Math.random() * CONFIG.boundaryMargin;
                            y = Math.random() * h;
                            break;
                        case 2: // Низ
                            x = Math.random() * w;
                            y = h + spread + Math.random() * CONFIG.boundaryMargin;
                            break;
                        case 3: // Лево
                            x = -spread - Math.random() * CONFIG.boundaryMargin;
                            y = Math.random() * h;
                            break;
                    }
                    
                    state.virtualStars.push(new Star(state.stars.length + i, x, y, true));
                }

                console.log(`Generated ${state.stars.length} real stars, ${state.virtualStars.length} virtual stars`);
                
                // 3. Вычисляем Вороного для всех звёзд
                computeVoronoi();
                
                const validCells = state.stars.filter(s => s.voronoiCell && s.voronoiCell.length >= 3).length;
                console.log(`Voronoi: ${validCells} valid real cells, ${state.boundaryPolygon.length} boundary points`);

                // 4. Связи (только между реальными звёздами)
                for (let i = 0; i < state.stars.length; i++) {
                    for (let j = i + 1; j < state.stars.length; j++) {
                        const s1 = state.stars[i];
                        const s2 = state.stars[j];
                        const d = Math.sqrt(Math.pow(s1.x - s2.x, 2) + Math.pow(s1.y - s2.y, 2));
                        if (d < CONFIG.connectionRange) {
                            if (s1.connections.length < CONFIG.maxConnections && 
                                s2.connections.length < CONFIG.maxConnections) {
                                s1.connections.push(s2.id);
                                s2.connections.push(s1.id);
                            }
                        }
                    }
                }

                ensureConnectivity();

                // 5. Игрок и враги
                const playerStar = state.stars[Math.floor(Math.random() * state.stars.length)];
                playerStar.isPlayer = true;
                state.playerStarId = playerStar.id;

                let enemiesPlaced = 0;
                while(enemiesPlaced < 3) {
                    const s = state.stars[Math.floor(Math.random() * state.stars.length)];
                    if (!s.isPlayer && !s.hasEnemy) {
                        s.hasEnemy = true;
                        enemiesPlaced++;
                    }
                }

                console.log("Map generated successfully!");
            } catch (e) {
                console.error("Error generating map:", e);
            }
        }

        function ensureConnectivity() {
            const connected = new Set([0]);
            while (connected.size < state.stars.length) {
                let minDist = Infinity;
                let bestPair = null;
                for (let i of connected) {
                    for (let j = 0; j < state.stars.length; j++) {
                        if (connected.has(j)) continue;
                        const d = Math.sqrt(Math.pow(state.stars[i].x - state.stars[j].x, 2) + 
                                           Math.pow(state.stars[i].y - state.stars[j].y, 2));
                        if (d < minDist) {
                            minDist = d;
                            bestPair = [i, j];
                        }
                    }
                }
                if (bestPair) {
                    const [i, j] = bestPair;
                    if (!state.stars[i].connections.includes(j)) {
                        state.stars[i].connections.push(j);
                        state.stars[j].connections.push(i);
                    }
                    connected.add(j);
                } else break;
            }
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Сектора Вороного (ТОЛЬКО реальные звёзды)
            state.stars.forEach(star => {
                if (!star.voronoiCell || star.voronoiCell.length < 3) return;
                
                ctx.fillStyle = star.sectorColor;
                ctx.strokeStyle = CONFIG.colors.sectorBorder;
                ctx.lineWidth = 1;
                
                ctx.beginPath();
                ctx.moveTo(star.voronoiCell[0].x, star.voronoiCell[0].y);
                for (let i = 1; i < star.voronoiCell.length; i++) {
                    ctx.lineTo(star.voronoiCell[i].x, star.voronoiCell[i].y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            });

            // 2. Линии связей
            ctx.strokeStyle = CONFIG.colors.line;
            ctx.lineWidth = 1;
            ctx.beginPath();
            state.stars.forEach(star => {
                star.connections.forEach(connId => {
                    const target = state.stars.find(s => s.id === connId);
                    if (target) {
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(target.x, target.y);
                    }
                });
            });
            ctx.stroke();

            // 3. Звёзды (ТОЛЬКО реальные)
            state.stars.forEach(star => {
                star.angle += 0.015;
                ctx.save();
                ctx.translate(star.x, star.y);

                ctx.globalAlpha = 0.25;
                ctx.save();
                ctx.rotate(star.angle);
                ctx.fillStyle = star.isPlayer ? CONFIG.colors.starActive : (star.hasEnemy ? '#d32f2f' : CONFIG.colors.star);
                ctx.fillRect(-5, -5, 10, 10);
                ctx.restore();

                ctx.globalAlpha = 1.0;
                ctx.fillStyle = star.isPlayer ? '#fff' : (star.hasEnemy ? '#ff5252' : '#ccc');
                ctx.fillRect(-3, -3, 6, 6);
                ctx.restore();
            });

            // 4. Глубокий космос поверх (с ломаной границей)
            drawDeepSpace();
        }

        function gameLoop() {
            if (state.isRunning) {
                state.time += 0.05;
                drawMap();
            }
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (state.isRunning) return;
            state.isRunning = true;
            startScreen.style.display = 'none';
            statusLight.classList.add('active');
            sysStatusText.innerText = "ONLINE";
            sysStatusText.style.color = "#00e676";
            resizeCanvas();
            generateBackgroundStars();
            generateMap();
            drawMap();
            requestAnimationFrame(gameLoop);
            console.log("Game started!");
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!state.isRunning) startGame();
                else console.log("Turn executed");
            }
        });

        startScreen.addEventListener('click', () => {
            if (!state.isRunning) startGame();
        });

        console.log("Script loaded, waiting for input...");
        resizeCanvas();
    </script>
</body>
</html>
