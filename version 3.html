<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Project: Rusty Core - Navigation</title>
    <style>
        /* --- БАЗОВЫЕ НАСТРОЙКИ --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: #8c8c8c;
            user-select: none;
        }

        /* --- ФОН (Эффект старого металла) --- */
        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%),
                repeating-linear-gradient(45deg, #111 0px, #111 1px, #0d0d0d 2px, #0d0d0d 4px);
        }
        .background::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* --- ЦЕНТРАЛЬНОЕ ОКНО ИГРЫ --- */
        .game-interface {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 650px;
            z-index: 10;
            background-color: #141414;
            border: 4px solid #3e2723;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                inset 0 0 50px rgba(0, 0, 0, 0.9),
                0 0 10px rgba(62, 39, 35, 0.5);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Болты */
        .bolt {
            position: absolute; width: 12px; height: 12px;
            background: radial-gradient(circle, #5d4037 30%, #1a1a1a 100%);
            border-radius: 50%; border: 1px solid #222;
        }
        .tl { top: -8px; left: -8px; } .tr { top: -8px; right: -8px; }
        .bl { bottom: -8px; left: -8px; } .br { bottom: -8px; right: -8px; }

        /* Хедер */
        .header {
            border-bottom: 2px solid #3e2723;
            padding-bottom: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 14px; color: #a1887f;
            text-shadow: 0 0 5px rgba(161, 136, 127, 0.3);
        }

        .status-light {
            width: 10px; height: 10px;
            background-color: #ff3d00; /* Изначально красный */
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #ff3d00;
            transition: all 0.5s ease; /* Плавная смена цвета */
        }
        .status-light.active {
            background-color: #00e676; /* Зеленый при старте */
            box-shadow: 0 0 8px #00e676;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }

        /* --- ЭКРАН ИГРЫ (CANVAS) --- */
        #game-container {
            flex-grow: 1;
            /* ИЗМЕНЕНО: Новый фон экрана (темно-серый с оттенком, как радар) */
            background-color: #0b0e0b; 
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            /* Эффект старого монитора */
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(0, 255, 0, 0.03), rgba(0, 0, 0, 0.02), rgba(0, 100, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
        }

        canvas {
            display: block; width: 100%; height: 100%;
        }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
        }

        /* --- ЭКРАН СТАРТА --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; text-align: center;
        }
        h1 { color: #d7ccc8; text-shadow: 0 0 10px #ff5722; font-size: 32px; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 14px; color: #888; max-width: 400px; line-height: 1.5; }
        .blink-text { margin-top: 30px; color: #ff5722; animation: blink 1s infinite; font-weight: bold; }

    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-interface">
        <div class="bolt tl"></div><div class="bolt tr"></div>
        <div class="bolt bl"></div><div class="bolt br"></div>

        <div class="header">
            <span>System: <span id="sys-status" style="color: #ff5722;">OFFLINE</span></span>
            <span>Hull Integrity: <span id="hull-status">100%</span></span>
            <span>Status: <div id="status-light" class="status-light"></div></span>
        </div>

        <div id="game-container">
            <div class="vignette"></div>
            <canvas id="gameCanvas"></canvas>
            
            <div id="start-screen">
                <h1>Rusty Core</h1>
                <p>Навигационная система готова.<br>Сектора загружены. Враги обнаружены.</p>
                <div class="blink-text">[ НАЖМИ ПРОБЕЛ ДЛЯ ЗАПУСКА ]</div>
            </div>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const CONFIG = {
            starCount: 35,        // Чуть меньше звезд для читаемости
            minStarDistance: 60,  // Минимальное расстояние между звездами (чтобы не слипались)
            maxConnections: 5,    // Максимум связей у одной звезды (3-5)
            minConnections: 2,    // Минимум связей (чтобы не было тупиков)
            connectionRange: 180, // Дистанция поиска соседей
            colors: {
                star: '#666',
                starActive: '#ff9800',
                line: '#444',
                lineActive: '#ff9800',
                sectorBg: 'rgba(255, 255, 255, 0.02)' // Очень слабый фон секторов
            }
        };

        // --- КЛАССЫ ---
        class Star {
            constructor(id, x, y) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.connections = []; // ID соседних звезд
                this.hasEnemy = false;
                this.isPlayer = false;
                this.sectorId = 0; // Будет назначен при генерации секторов
            }
        }

        // --- СОСТОЯНИЕ ---
        const state = {
            isRunning: false,
            stars: [],
            playerStarId: null,
            hull: 100
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const statusLight = document.getElementById('status-light');
        const sysStatusText = document.getElementById('sys-status');
        const hullText = document.getElementById('hull-status');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            if (state.isRunning) drawMap();
        }
        window.addEventListener('resize', resizeCanvas);

        // --- ГЕНЕРАЦИЯ КАРТЫ (УЛУЧШЕННАЯ) ---
        function generateMap() {
            state.stars = [];
            const w = canvas.width;
            const h = canvas.height;
            const padding = 60;

            // 1. Генерация звезд с проверкой минимального расстояния
            let attempts = 0;
            while (state.stars.length < CONFIG.starCount && attempts < 1000) {
                const x = Math.random() * (w - padding * 2) + padding;
                const y = Math.random() * (h - padding * 2) + padding;
                
                let tooClose = false;
                for (let star of state.stars) {
                    const dx = star.x - x;
                    const dy = star.y - y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < CONFIG.minStarDistance) {
                        tooClose = true;
                        break;
                    }
                }

                if (!tooClose) {
                    state.stars.push(new Star(state.stars.length, x, y));
                }
                attempts++;
            }

            // 2. Создание связей (Граф)
            // Шаг А: Гарантируем связность (Minimum Spanning Tree подход)
            // Берем первую звезду, находим ближайшую несоединенную, соединяем. Повторяем.
            const connected = new Set([0]); // Индексы уже подключенных звезд
            
            while (connected.size < state.stars.length) {
                let minDist = Infinity;
                let bestPair = null;

                // Ищем ближайшую пару (одна в connected, другая нет)
                for (let i of connected) {
                    for (let j = 0; j < state.stars.length; j++) {
                        if (connected.has(j)) continue;
                        
                        const d = getDistance(state.stars[i], state.stars[j]);
                        if (d < CONFIG.connectionRange && d < minDist) {
                            minDist = d;
                            bestPair = [i, j];
                        }
                    }
                }

                if (bestPair) {
                    connectStars(bestPair[0], bestPair[1]);
                    connected.add(bestPair[1]);
                } else {
                    // Если ближайшая звезда слишком далеко, берем просто любую из connected и соединяем с ближайшей внешней
                    // Это страховка на случай, если звезды разбросаны очень широко
                    const i = Array.from(connected)[Math.floor(Math.random() * connected.size)];
                    let closestJ = -1;
                    let closestDist = Infinity;
                    
                    for (let j = 0; j < state.stars.length; j++) {
                        if (!connected.has(j)) {
                            const d = getDistance(state.stars[i], state.stars[j]);
                            if (d < closestDist) {
                                closestDist = d;
                                closestJ = j;
                            }
                        }
                    }
                    if (closestJ !== -1) {
                        connectStars(i, closestJ);
                        connected.add(closestJ);
                    } else {
                        break; // Все соединено
                    }
                }
            }

            // Шаг Б: Добавляем дополнительные связи для вариативности путей (циклы)
            // Но не превышаем maxConnections
            state.stars.forEach(star => {
                if (star.connections.length >= CONFIG.maxConnections) return;

                // Ищем соседей в радиусе, у которых тоже есть место для связей
                const potentialNeighbors = state.stars.filter(other => {
                    if (other === star) return false;
                    if (star.connections.includes(other.id)) return false; // Уже соединены
                    if (other.connections.length >= CONFIG.maxConnections) return false;
                    
                    const d = getDistance(star, other);
                    return d < CONFIG.connectionRange;
                });

                // Сортируем по расстоянию и берем несколько ближайших
                potentialNeighbors.sort((a, b) => getDistance(star, a) - getDistance(star, b));
                
                const needed = Math.floor(Math.random() * 2) + 1; // Добавить 1-2 связи
                for (let i = 0; i < needed && i < potentialNeighbors.length; i++) {
                    connectStars(star.id, potentialNeighbors[i].id);
                }
            });

            // 3. Распределение по секторам (визуально)
            // Просто делим карту на 4 части для примера
            state.stars.forEach(star => {
                if (star.x < w/2 && star.y < h/2) star.sectorId = 1;
                else if (star.x >= w/2 && star.y < h/2) star.sectorId = 2;
                else if (star.x < w/2 && star.y >= h/2) star.sectorId = 3;
                else star.sectorId = 4;
            });

            // 4. Игрок и Враги
            const playerStar = state.stars[Math.floor(Math.random() * state.stars.length)];
            playerStar.isPlayer = true;
            state.playerStarId = playerStar.id;

            // 3 врага в случайных местах (не там где игрок)
            let enemiesPlaced = 0;
            while(enemiesPlaced < 3) {
                const s = state.stars[Math.floor(Math.random() * state.stars.length)];
                if (!s.isPlayer && !s.hasEnemy) {
                    s.hasEnemy = true;
                    enemiesPlaced++;
                }
            }
        }

        function getDistance(s1, s2) {
            const dx = s1.x - s2.x;
            const dy = s1.y - s2.y;
            return Math.sqrt(dx*dx + dy*dy);
        }

        function connectStars(id1, id2) {
            const s1 = state.stars.find(s => s.id === id1);
            const s2 = state.stars.find(s => s.id === id2);
            if (s1 && s2) {
                if (!s1.connections.includes(id2)) s1.connections.push(id2);
                if (!s2.connections.includes(id1)) s2.connections.push(id1);
            }
        }

        // --- ОТРИСОВКА ---
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Фоны секторов (еле заметные)
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = CONFIG.colors.sectorBg;
            ctx.fillRect(0, 0, w/2, h/2);
            ctx.fillRect(w/2, 0, w/2, h/2);
            ctx.fillRect(0, h/2, w/2, h/2);
            ctx.fillRect(w/2, h/2, w/2, h/2);
            
            // Границы секторов (пунктир)
            ctx.strokeStyle = '#222';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
            ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
            ctx.stroke();
            ctx.setLineDash([]);

            // 2. Линии связей
            ctx.strokeStyle = CONFIG.colors.line;
            ctx.lineWidth = 1;
            ctx.beginPath();
            state.stars.forEach(star => {
                star.connections.forEach(connId => {
                    const target = state.stars.find(s => s.id === connId);
                    if (target) {
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(target.x, target.y);
                    }
                });
            });
            ctx.stroke();

            // 3. Звезды
            state.stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, 5, 0, Math.PI * 2);
                
                if (star.isPlayer) {
                    ctx.fillStyle = CONFIG.colors.starActive;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = CONFIG.colors.starActive;
                } else if (star.hasEnemy) {
                    ctx.fillStyle = '#d32f2f';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#d32f2f';
                } else {
                    ctx.fillStyle = CONFIG.colors.star;
                    ctx.shadowBlur = 0;
                }
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // --- ЗАПУСК ИГРЫ ---
        function startGame() {
            if (state.isRunning) return;
            state.isRunning = true;
            
            // UI обновления
            startScreen.style.display = 'none';
            statusLight.classList.add('active'); // Зеленый цвет
            sysStatusText.innerText = "ONLINE";
            sysStatusText.style.color = "#00e676";
            
            resizeCanvas();
            generateMap();
            drawMap();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!state.isRunning) {
                    startGame();
                } else {
                    // Логика хода
                    console.log("Turn executed");
                }
            }
        });

        // Инициализация
        resizeCanvas();

    </script>
</body>
</html>
