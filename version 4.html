<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Project: Rusty Core - Territory</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: #8c8c8c;
            user-select: none;
        }

        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 50% 50%, #2a2a2a 0%, #050505 100%),
                repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, #0f0f0f 4px, #0f0f0f 6px);
        }
        .background::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .game-interface {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 650px;
            z-index: 10;
            background-color: #141414;
            border: 4px solid #3e2723;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                inset 0 0 50px rgba(0, 0, 0, 0.9),
                0 0 10px rgba(62, 39, 35, 0.5);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .bolt {
            position: absolute; width: 12px; height: 12px;
            background: radial-gradient(circle, #5d4037 30%, #1a1a1a 100%);
            border-radius: 50%; border: 1px solid #222;
        }
        .tl { top: -8px; left: -8px; } .tr { top: -8px; right: -8px; }
        .bl { bottom: -8px; left: -8px; } .br { bottom: -8px; right: -8px; }

        .header {
            border-bottom: 2px solid #3e2723;
            padding-bottom: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 14px; color: #a1887f;
            text-shadow: 0 0 5px rgba(161, 136, 127, 0.3);
        }

        .status-light {
            width: 10px; height: 10px;
            background-color: #ff3d00;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #ff3d00;
            transition: all 0.5s ease;
        }
        .status-light.active {
            background-color: #00e676;
            box-shadow: 0 0 8px #00e676;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }

        #game-container {
            flex-grow: 1;
            background-color: #0b0e0b;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); 
            animation: led-pulse 4s infinite ease-in-out;
        }

        @keyframes led-pulse {
            0% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
            50% { box-shadow: inset 0 0 90px rgba(0, 255, 100, 0.1); }
            100% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
        }

        canvas {
            display: block; width: 100%; height: 100%;
        }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 5;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; text-align: center;
        }
        h1 { color: #d7ccc8; text-shadow: 0 0 10px #ff5722; font-size: 32px; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 14px; color: #888; max-width: 400px; line-height: 1.5; }
        .blink-text { margin-top: 30px; color: #ff5722; animation: blink 1s infinite; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-interface">
        <div class="bolt tl"></div><div class="bolt tr"></div>
        <div class="bolt bl"></div><div class="bolt br"></div>

        <div class="header">
            <span>System: <span id="sys-status" style="color: #ff5722;">OFFLINE</span></span>
            <span>Hull Integrity: <span id="hull-status">100%</span></span>
            <span>Status: <div id="status-light" class="status-light"></div></span>
        </div>

        <div id="game-container">
            <div class="vignette"></div>
            <canvas id="gameCanvas"></canvas>
            
            <div id="start-screen">
                <h1>Rusty Core</h1>
                <p>Навигационная система готова.<br>Сектора загружены. Враги обнаружены.</p>
                <div class="blink-text">[ НАЖМИ ПРОБЕЛ ДЛЯ ЗАПУСКА ]</div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            starCount: 50,
            minStarDistance: 70,
            maxConnections: 5,
            connectionRange: 200,
            sectorCount: 6, // Фиксированное количество секторов
            colors: {
                star: '#888',
                starActive: '#ff9800',
                line: '#444',
                sectors: [
                    'rgba(139, 69, 19, 0.25)',
                    'rgba(25, 25, 112, 0.25)',
                    'rgba(46, 139, 87, 0.25)',
                    'rgba(128, 128, 0, 0.25)',
                    'rgba(139, 0, 0, 0.25)',
                    'rgba(75, 0, 130, 0.25)'
                ],
                sectorBorder: 'rgba(150, 150, 150, 0.4)'
            }
        };

        class Star {
            constructor(id, x, y) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.connections = [];
                this.hasEnemy = false;
                this.isPlayer = false;
                this.sectorId = -1;
                this.angle = Math.random() * Math.PI * 2;
            }
        }

        class Sector {
            constructor(id, color) {
                this.id = id;
                this.color = color;
                this.starIds = [];
                this.centerX = 0;
                this.centerY = 0;
                this.hullPoints = [];
            }

            calculateCenter(stars) {
                if (this.starIds.length === 0) return;
                let sumX = 0, sumY = 0;
                this.starIds.forEach(id => {
                    const s = stars.find(star => star.id === id);
                    sumX += s.x;
                    sumY += s.y;
                });
                this.centerX = sumX / this.starIds.length;
                this.centerY = sumY / this.starIds.length;
            }

            calculateHull(stars) {
                if (this.starIds.length < 2) return;
                
                const points = this.starIds.map(id => {
                    const s = stars.find(star => star.id === id);
                    return {x: s.x, y: s.y};
                });

                // Расширяем точки от центра для заполнения пространства
                const expanded = points.map(p => {
                    const dx = p.x - this.centerX;
                    const dy = p.y - this.centerY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const expandFactor = 1.8; // Сильное расширение для заполнения зазоров
                    return {
                        x: this.centerX + dx * expandFactor,
                        y: this.centerY + dy * expandFactor
                    };
                });

                this.hullPoints = getConvexHull(expanded);
            }
        }

        const state = {
            isRunning: false,
            stars: [],
            sectors: [],
            playerStarId: null,
            hull: 100,
            time: 0
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const statusLight = document.getElementById('status-light');
        const sysStatusText = document.getElementById('sys-status');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function getConvexHull(points) {
            if (points.length <= 3) return points;
            points.sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);
            const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
            const lower = [];
            for (let p of points) {
                while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
                    lower.pop();
                }
                lower.push(p);
            }
            const upper = [];
            for (let i = points.length - 1; i >= 0; i--) {
                const p = points[i];
                while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
                    upper.pop();
                }
                upper.push(p);
            }
            upper.pop();
            lower.pop();
            return lower.concat(upper);
        }

        function generateMap() {
            state.stars = [];
            state.sectors = [];
            const w = canvas.width;
            const h = canvas.height;
            const padding = 60;

            // 1. Генерация звезд
            let attempts = 0;
            while (state.stars.length < CONFIG.starCount && attempts < 1000) {
                const x = Math.random() * (w - padding * 2) + padding;
                const y = Math.random() * (h - padding * 2) + padding;
                
                let tooClose = false;
                for (let star of state.stars) {
                    const dist = Math.sqrt(Math.pow(star.x - x, 2) + Math.pow(star.y - y, 2));
                    if (dist < CONFIG.minStarDistance) {
                        tooClose = true;
                        break;
                    }
                }
                if (!tooClose) {
                    state.stars.push(new Star(state.stars.length, x, y));
                }
                attempts++;
            }

            // 2. Связи
            const connected = new Set([0]);
            while (connected.size < state.stars.length) {
                let minDist = Infinity;
                let bestPair = null;
                for (let i of connected) {
                    for (let j = 0; j < state.stars.length; j++) {
                        if (connected.has(j)) continue;
                        const d = Math.sqrt(Math.pow(state.stars[i].x - state.stars[j].x, 2) + Math.pow(state.stars[i].y - state.stars[j].y, 2));
                        if (d < CONFIG.connectionRange && d < minDist) {
                            minDist = d;
                            bestPair = [i, j];
                        }
                    }
                }
                if (bestPair) {
                    connectStars(bestPair[0], bestPair[1]);
                    connected.add(bestPair[1]);
                } else {
                    const i = Array.from(connected)[Math.floor(Math.random() * connected.size)];
                    let closestJ = -1, closestDist = Infinity;
                    for (let j = 0; j < state.stars.length; j++) {
                        if (!connected.has(j)) {
                            const d = Math.sqrt(Math.pow(state.stars[i].x - state.stars[j].x, 2) + Math.pow(state.stars[i].y - state.stars[j].y, 2));
                            if (d < closestDist) { closestDist = d; closestJ = j; }
                        }
                    }
                    if (closestJ !== -1) { connectStars(i, closestJ); connected.add(closestJ); }
                    else break;
                }
            }

            state.stars.forEach(star => {
                if (star.connections.length >= CONFIG.maxConnections) return;
                const potential = state.stars.filter(other => {
                    if (other === star) return false;
                    if (star.connections.includes(other.id)) return false;
                    if (other.connections.length >= CONFIG.maxConnections) return false;
                    const d = Math.sqrt(Math.pow(star.x - other.x, 2) + Math.pow(star.y - other.y, 2));
                    return d < CONFIG.connectionRange;
                });
                potential.sort((a, b) => {
                    const da = Math.sqrt(Math.pow(star.x - a.x, 2) + Math.pow(star.y - a.y, 2));
                    const db = Math.sqrt(Math.pow(star.x - b.x, 2) + Math.pow(star.y - b.y, 2));
                    return da - db;
                });
                const needed = Math.floor(Math.random() * 2) + 1;
                for (let i = 0; i < needed && i < potential.length; i++) {
                    connectStars(star.id, potential[i].id);
                }
            });

            // 3. Сектора - распределяем ВСЕ звезды по секторам
            assignSectors();

            // 4. Игрок и Враги
            const playerStar = state.stars[Math.floor(Math.random() * state.stars.length)];
            playerStar.isPlayer = true;
            state.playerStarId = playerStar.id;

            let enemiesPlaced = 0;
            while(enemiesPlaced < 3) {
                const s = state.stars[Math.floor(Math.random() * state.stars.length)];
                if (!s.isPlayer && !s.hasEnemy) {
                    s.hasEnemy = true;
                    enemiesPlaced++;
                }
            }
        }

        function assignSectors() {
            // Создаем сектора
            for (let i = 0; i < CONFIG.sectorCount; i++) {
                state.sectors.push(new Sector(i, CONFIG.colors.sectors[i % CONFIG.colors.sectors.length]));
            }

            // Распределяем звезды по секторам равномерно
            const shuffledStars = state.stars.map(s => s.id).sort(() => Math.random() - 0.5);
            const starsPerSector = Math.floor(shuffledStars.length / CONFIG.sectorCount);

            shuffledStars.forEach((starId, index) => {
                const sectorIndex = Math.floor(index / starsPerSector) % CONFIG.sectorCount;
                const star = state.stars.find(s => s.id === starId);
                star.sectorId = sectorIndex;
                state.sectors[sectorIndex].starIds.push(starId);
            });

            // Оставшиеся звезды распределяем случайно
            const remainder = shuffledStars.length % CONFIG.sectorCount;
            for (let i = 0; i < remainder; i++) {
                const sectorIndex = i;
                const starId = shuffledStars[shuffledStars.length - remainder + i];
                const star = state.stars.find(s => s.id === starId);
                star.sectorId = sectorIndex;
                state.sectors[sectorIndex].starIds.push(starId);
            }

            // Вычисляем центры и границы
            state.sectors.forEach(sec => {
                sec.calculateCenter(state.stars);
                sec.calculateHull(state.stars);
            });
        }

        function connectStars(id1, id2) {
            const s1 = state.stars.find(s => s.id === id1);
            const s2 = state.stars.find(s => s.id === id2);
            if (s1 && s2) {
                if (!s1.connections.includes(id2)) s1.connections.push(id2);
                if (!s2.connections.includes(id1)) s2.connections.push(id1);
            }
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Сектора (заполняют всё пространство)
            state.sectors.forEach(sec => {
                if (sec.hullPoints.length < 2) return;
                ctx.fillStyle = sec.color;
                ctx.strokeStyle = CONFIG.colors.sectorBorder;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(sec.hullPoints[0].x, sec.hullPoints[0].y);
                for (let i = 1; i < sec.hullPoints.length; i++) {
                    ctx.lineTo(sec.hullPoints[i].x, sec.hullPoints[i].y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            });

            // 2. Линии связей
            ctx.strokeStyle = CONFIG.colors.line;
            ctx.lineWidth = 1;
            ctx.beginPath();
            state.stars.forEach(star => {
                star.connections.forEach(connId => {
                    const target = state.stars.find(s => s.id === connId);
                    if (target) {
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(target.x, target.y);
                    }
                });
            });
            ctx.stroke();

            // 3. Звезды (квадраты)
            state.stars.forEach(star => {
                star.angle += 0.015;
                ctx.save();
                ctx.translate(star.x, star.y);

                // Фоновый вращающийся квадрат (УМЕНЬШЕН НА 50%)
                ctx.globalAlpha = 0.25;
                ctx.save();
                ctx.rotate(star.angle);
                ctx.fillStyle = star.isPlayer ? CONFIG.colors.starActive : (star.hasEnemy ? '#d32f2f' : CONFIG.colors.star);
                ctx.fillRect(-5, -5, 10, 10); // Было -10,-10,20,20 -> теперь 50% меньше
                ctx.restore();

                ctx.globalAlpha = 1.0;

                // Центральный квадрат (НЕ ВРАЩАЕТСЯ)
                ctx.fillStyle = star.isPlayer ? '#fff' : (star.hasEnemy ? '#ff5252' : '#ccc');
                ctx.fillRect(-3, -3, 6, 6); // Статичный квадрат в центре

                ctx.restore();
            });
        }

        function gameLoop() {
            if (state.isRunning) {
                state.time += 0.05;
                drawMap();
            }
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (state.isRunning) return;
            state.isRunning = true;
            startScreen.style.display = 'none';
            statusLight.classList.add('active');
            sysStatusText.innerText = "ONLINE";
            sysStatusText.style.color = "#00e676";
            resizeCanvas();
            generateMap();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!state.isRunning) startGame();
                else console.log("Turn executed");
            }
        });

        resizeCanvas();
    </script>
</body>
</html>
