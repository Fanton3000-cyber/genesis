<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Project: Rusty Core - Final Connections</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: #8c8c8c;
            user-select: none;
        }

        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 50% 50%, #2a2a2a 0%, #050505 100%),
                repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, #0f0f0f 4px, #0f0f0f 6px);
        }
        .background::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .game-interface {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 650px;
            z-index: 10;
            background-color: #141414;
            border: 4px solid #3e2723;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                inset 0 0 50px rgba(0, 0, 0, 0.9),
                0 0 10px rgba(62, 39, 35, 0.5);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .bolt {
            position: absolute; width: 12px; height: 12px;
            background: radial-gradient(circle, #5d4037 30%, #1a1a1a 100%);
            border-radius: 50%; border: 1px solid #222;
        }
        .tl { top: -8px; left: -8px; } .tr { top: -8px; right: -8px; }
        .bl { bottom: -8px; left: -8px; } .br { bottom: -8px; right: -8px; }

        .header {
            border-bottom: 2px solid #3e2723;
            padding-bottom: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 14px; color: #a1887f;
            text-shadow: 0 0 5px rgba(161, 136, 127, 0.3);
        }

        .status-light {
            width: 10px; height: 10px;
            background-color: #ff3d00;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #ff3d00;
            transition: all 0.5s ease;
        }
        .status-light.active {
            background-color: #00e676;
            box-shadow: 0 0 8px #00e676;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }

        #game-container {
            flex-grow: 1;
            background-color: #0b0e0b;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); 
            animation: led-pulse 4s infinite ease-in-out;
            cursor: grab;
        }
        
        #game-container:active {
            cursor: grabbing;
        }

        @keyframes led-pulse {
            0% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
            50% { box-shadow: inset 0 0 90px rgba(0, 255, 100, 0.1); }
            100% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
        }

        canvas {
            display: block; width: 100%; height: 100%;
        }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 5;
        }
        
        .zoom-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 5px 10px;
            font-size: 12px;
            color: #8c8c8c;
            z-index: 15;
            pointer-events: none;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; text-align: center;
            cursor: pointer;
        }
        h1 { color: #d7ccc8; text-shadow: 0 0 10px #ff5722; font-size: 32px; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 14px; color: #888; max-width: 400px; line-height: 1.5; }
        .blink-text { margin-top: 30px; color: #ff5722; animation: blink 1s infinite; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-interface">
        <div class="bolt tl"></div><div class="bolt tr"></div>
        <div class="bolt bl"></div><div class="bolt br"></div>

        <div class="header">
            <span>System: <span id="sys-status" style="color: #ff5722;">OFFLINE</span></span>
            <span>Hull Integrity: <span id="hull-status">100%</span></span>
            <span>Status: <div id="status-light" class="status-light"></div></span>
        </div>

        <div id="game-container">
            <div class="vignette"></div>
            <canvas id="gameCanvas"></canvas>
            <div class="zoom-indicator" id="zoom-indicator">Zoom: 100%</div>
            
            <div id="start-screen">
                <h1>Rusty Core</h1>
                <p>Навигационная система готова.<br>Сектора загружены. Враги обнаружены.</p>
                <div class="blink-text">[ НАЖМИ ПРОБЕЛ ИЛИ КЛИКНИ ]</div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            starCount: 28,
            virtualStarCount: 70,
            minStarDistance: 90,
            maxConnections: 5,
            connectionRange: 200,
            boundaryMargin: 90,
            virtualStarDistance: 15,
            colors: {
                star: '#888',
                starActive: '#ff9800',
                line: '#444',
                sectorBorder: 'rgba(140, 140, 140, 0.4)',
                deepSpace: 'rgba(3, 5, 10, 0.95)',
                boundaryLine: 'rgba(120, 160, 200, 0.5)'
            }
        };

        const camera = {
            x: 0,
            y: 0,
            zoom: 1,
            minZoom: 1,
            maxZoom: 3,
            isDragging: false,
            lastMouseX: 0,
            lastMouseY: 0
        };

        class Star {
            constructor(id, x, y, isVirtual = false) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.isVirtual = isVirtual;
                this.connections = [];
                this.hasEnemy = false;
                this.isPlayer = false;
                this.sectorColor = '';
                this.voronoiCell = [];
                this.angle = Math.random() * Math.PI * 2;
            }
        }

        const state = {
            isRunning: false,
            stars: [],
            virtualStars: [],
            playerStarId: null,
            hull: 100,
            time: 0,
            bgStars: [],
            boundaryEdges: [],
            mapBounds: { minX: 0, maxX: 0, minY: 0, maxY: 0, width: 0, height: 0 }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const statusLight = document.getElementById('status-light');
        const sysStatusText = document.getElementById('sys-status');
        const zoomIndicator = document.getElementById('zoom-indicator');
        const gameContainer = document.getElementById('game-container');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            generateBackgroundStars();
        }
        window.addEventListener('resize', resizeCanvas);

        function generateBackgroundStars() {
            state.bgStars = [];
            const count = 150;
            for (let i = 0; i < count; i++) {
                state.bgStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    alpha: 0.3 + Math.random() * 0.5,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        // --- УПРАВЛЕНИЕ КАМЕРОЙ ---
        function updateZoomIndicator() {
            zoomIndicator.textContent = `Zoom: ${Math.round(camera.zoom * 100)}%`;
        }

        function screenToWorld(screenX, screenY) {
            return {
                x: (screenX - canvas.width / 2) / camera.zoom + canvas.width / 2 + camera.x,
                y: (screenY - canvas.height / 2) / camera.zoom + canvas.height / 2 + camera.y
            };
        }

        gameContainer.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                camera.isDragging = true;
                camera.lastMouseX = e.clientX;
                camera.lastMouseY = e.clientY;
                gameContainer.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (camera.isDragging) {
                const deltaX = e.clientX - camera.lastMouseX;
                const deltaY = e.clientY - camera.lastMouseY;
                
                camera.x -= deltaX / camera.zoom;
                camera.y -= deltaY / camera.zoom;
                
                clampCamera();
                
                camera.lastMouseX = e.clientX;
                camera.lastMouseY = e.clientY;
            }
        });

        window.addEventListener('mouseup', () => {
            camera.isDragging = false;
            gameContainer.style.cursor = 'grab';
        });

        function clampCamera() {
            const bounds = state.mapBounds;
            const padding = 50;
            
            const viewWidth = canvas.width / camera.zoom;
            const viewHeight = canvas.height / camera.zoom;
            
            const mapWidth = bounds.width;
            const mapHeight = bounds.height;
            
            if (mapWidth < viewWidth) {
                camera.x = 0;
            } else {
                const minX = bounds.minX - padding + viewWidth / 2 - canvas.width / 2;
                const maxX = bounds.maxX + padding - viewWidth / 2 - canvas.width / 2;
                camera.x = Math.max(minX, Math.min(maxX, camera.x));
            }
            
            if (mapHeight < viewHeight) {
                camera.y = 0;
            } else {
                const minY = bounds.minY - padding + viewHeight / 2 - canvas.height / 2;
                const maxY = bounds.maxY + padding - viewHeight / 2 - canvas.height / 2;
                camera.y = Math.max(minY, Math.min(maxY, camera.y));
            }
        }

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * (1 + delta)));
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const worldPosBefore = screenToWorld(mouseX, mouseY);
            
            camera.zoom = newZoom;
            
            const worldPosAfter = screenToWorld(mouseX, mouseY);
            
            camera.x += worldPosBefore.x - worldPosAfter.x;
            camera.y += worldPosBefore.y - worldPosAfter.y;
            
            clampCamera();
            updateZoomIndicator();
        }, { passive: false });

        // --- ОТРИСОВКА ГЛУБОКОГО КОСМОСА ---
        function drawDeepSpace() {
            ctx.save();
            
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            ctx.translate(-camera.x, -camera.y);
            
            const margin = 10000;
            ctx.beginPath();
            ctx.rect(-margin, -margin, canvas.width + margin * 2, canvas.height + margin * 2);
            
            if (state.boundaryEdges.length > 0) {
                const points = [];
                const pointMap = new Map();
                
                state.boundaryEdges.forEach(edge => {
                    [edge.start, edge.end].forEach(p => {
                        const key = `${Math.round(p.x)},${Math.round(p.y)}`;
                        if (!pointMap.has(key)) {
                            pointMap.set(key, points.length);
                            points.push({x: p.x, y: p.y});
                        }
                    });
                });
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                points.sort((a, b) => {
                    const angleA = Math.atan2(a.y - centerY, a.x - centerX);
                    const angleB = Math.atan2(b.y - centerY, b.x - centerX);
                    return angleA - angleB;
                });
                
                if (points.length >= 3) {
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.closePath();
                }
            }
            
            ctx.fillStyle = CONFIG.colors.deepSpace;
            ctx.fill('evenodd');
            ctx.restore();
            
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            ctx.translate(-camera.x, -camera.y);
            
            const boundaryPoints = [];
            state.boundaryEdges.forEach(edge => {
                boundaryPoints.push(edge.start, edge.end);
            });
            
            state.bgStars.forEach(star => {
                const isOutside = !isPointInPolygon(star.x, star.y, boundaryPoints);
                if (isOutside) {
                    const twinkle = 0.5 + 0.5 * Math.sin(state.time * 0.5 + star.twinkle);
                    ctx.fillStyle = `rgba(200, 220, 255, ${star.alpha * twinkle})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size / camera.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            if (state.boundaryEdges.length > 0) {
                ctx.strokeStyle = CONFIG.colors.boundaryLine;
                ctx.lineWidth = 1.5 / camera.zoom;
                ctx.setLineDash([5 / camera.zoom, 4 / camera.zoom]);
                ctx.beginPath();
                
                state.boundaryEdges.forEach(edge => {
                    ctx.moveTo(edge.start.x, edge.start.y);
                    ctx.lineTo(edge.end.x, edge.end.y);
                });
                
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            ctx.restore();
        }

        function isPointInPolygon(x, y, points) {
            if (points.length < 6) return true;
            
            const unique = [];
            const seen = new Set();
            points.forEach(p => {
                const key = `${Math.round(p.x)},${Math.round(p.y)}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    unique.push(p);
                }
            });
            
            if (unique.length < 3) return true;
            
            let inside = false;
            for (let i = 0, j = unique.length - 1; i < unique.length; j = i++) {
                const xi = unique[i].x, yi = unique[i].y;
                const xj = unique[j].x, yj = unique[j].y;
                const intersect = ((yi > y) !== (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        // --- ДИАГРАММА ВОРОНОГО ---
        function computeVoronoi() {
            const w = canvas.width;
            const h = canvas.height;
            const allStars = [...state.stars, ...state.virtualStars];

            allStars.forEach(star => {
                star.voronoiCell = [
                    {x: -10000, y: -10000},
                    {x: w + 10000, y: -10000},
                    {x: w + 10000, y: h + 10000},
                    {x: -10000, y: h + 10000}
                ];
            });

            allStars.forEach(star => {
                allStars.forEach(other => {
                    if (star === other) return;
                    clipCellByBisector(star, other);
                });
            });

            buildBoundaryFromEdges(allStars);
            
            if (state.boundaryEdges.length > 0) {
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                state.boundaryEdges.forEach(edge => {
                    minX = Math.min(minX, edge.start.x, edge.end.x);
                    maxX = Math.max(maxX, edge.start.x, edge.end.x);
                    minY = Math.min(minY, edge.start.y, edge.end.y);
                    maxY = Math.max(maxY, edge.start.y, edge.end.y);
                });
                
                state.mapBounds = { 
                    minX, 
                    maxX, 
                    minY, 
                    maxY, 
                    width: maxX - minX, 
                    height: maxY - minY 
                };
            }
        }

        function buildBoundaryFromEdges(allStars) {
            state.boundaryEdges = [];
            const edgeSet = new Set();
            
            state.stars.forEach(realStar => {
                if (!realStar.voronoiCell || realStar.voronoiCell.length < 3) return;
                
                for (let i = 0; i < realStar.voronoiCell.length; i++) {
                    const p1 = realStar.voronoiCell[i];
                    const p2 = realStar.voronoiCell[(i + 1) % realStar.voronoiCell.length];
                    
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    
                    let nearestStar = null;
                    let nearestDist = Infinity;
                    
                    allStars.forEach(other => {
                        if (other === realStar) return;
                        const d = Math.sqrt(Math.pow(other.x - midX, 2) + Math.pow(other.y - midY, 2));
                        if (d < nearestDist) {
                            nearestDist = d;
                            nearestStar = other;
                        }
                    });
                    
                    if (nearestStar && nearestStar.isVirtual) {
                        const key = `${Math.round(p1.x)},${Math.round(p1.y)}-${Math.round(p2.x)},${Math.round(p2.y)}`;
                        const reverseKey = `${Math.round(p2.x)},${Math.round(p2.y)}-${Math.round(p1.x)},${Math.round(p1.y)}`;
                        
                        if (!edgeSet.has(key) && !edgeSet.has(reverseKey)) {
                            edgeSet.add(key);
                            state.boundaryEdges.push({ start: p1, end: p2 });
                        }
                    }
                }
            });
            
            console.log(`Boundary: ${state.boundaryEdges.length} edges`);
        }

        function clipCellByBisector(star, other) {
            const midX = (star.x + other.x) / 2;
            const midY = (star.y + other.y) / 2;
            const nx = star.x - other.x;
            const ny = star.y - other.y;

            const newCell = [];
            const cell = star.voronoiCell;
            if (cell.length === 0) return;

            for (let i = 0; i < cell.length; i++) {
                const curr = cell[i];
                const next = cell[(i + 1) % cell.length];

                const currDist = (curr.x - midX) * nx + (curr.y - midY) * ny;
                const nextDist = (next.x - midX) * nx + (next.y - midY) * ny;
                const epsilon = 0.001;

                if (currDist >= -epsilon) {
                    newCell.push({x: curr.x, y: curr.y});
                }

                if ((currDist >= -epsilon && nextDist < -epsilon) || 
                    (currDist < -epsilon && nextDist >= -epsilon)) {
                    const t = currDist / (currDist - nextDist);
                    const intersectX = curr.x + t * (next.x - curr.x);
                    const intersectY = curr.y + t * (next.y - curr.y);
                    newCell.push({x: intersectX, y: intersectY});
                }
            }
            star.voronoiCell = newCell;
        }

        // --- НОВАЯ ФУНКЦИЯ ГЕНЕРАЦИИ СВЯЗЕЙ С УГЛОВЫМ РАСПРЕДЕЛЕНИЕМ ---
        function generateConnections() {
            // Очищаем все связи
            state.stars.forEach(star => {
                star.connections = [];
            });

            // Для каждой звезды находим соседей с учётом направления
            state.stars.forEach(star => {
                const neighbors = [];
                
                // Находим всех потенциальных соседей в радиусе
                state.stars.forEach(other => {
                    if (star === other) return;
                    
                    const dx = other.x - star.x;
                    const dy = other.y - star.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.connectionRange && dist > 0) {
                        const angle = Math.atan2(dy, dx);
                        neighbors.push({
                            star: other,
                            dist: dist,
                            angle: angle
                        });
                    }
                });
                
                // Сортируем по расстоянию (ближайшие приоритетнее)
                neighbors.sort((a, b) => a.dist - b.dist);
                
                // Распределяем связи по угловым секторам
                // Делим круг на 8 секторов по 45 градусов
                const sectorSize = Math.PI / 4; // 45 градусов
                const sectors = new Map(); // sectorIndex -> best neighbor
                
                neighbors.forEach(neighbor => {
                    // Определяем сектор (0-7)
                    let sectorIndex = Math.floor((neighbor.angle + Math.PI) / sectorSize);
                    if (sectorIndex >= 8) sectorIndex = 7;
                    if (sectorIndex < 0) sectorIndex = 0;
                    
                    // В каждом секторе берём только ближайшую звезду
                    if (!sectors.has(sectorIndex)) {
                        sectors.set(sectorIndex, neighbor);
                    }
                });
                
                // Подключаем не более maxConnections звёзд из разных секторов
                const selectedNeighbors = Array.from(sectors.values())
                    .sort((a, b) => a.dist - b.dist)
                    .slice(0, CONFIG.maxConnections);
                
                selectedNeighbors.forEach(neighbor => {
                    // Проверяем, что у соседней звезды тоже есть место
                    if (neighbor.star.connections.length < CONFIG.maxConnections) {
                        if (!star.connections.includes(neighbor.star.id)) {
                            star.connections.push(neighbor.star.id);
                            neighbor.star.connections.push(star.id);
                        }
                    }
                });
            });

            // Гарантируем связность карты (но с проверкой лимитов)
            ensureConnectivity();
            
            // Логируем распределение
            const distribution = {};
            state.stars.forEach(star => {
                const count = star.connections.length;
                distribution[count] = (distribution[count] || 0) + 1;
            });
            console.log('Connection distribution:', distribution);
        }

        // --- ОБНОВЛЁННАЯ ФУНКЦИЯ СВЯЗНОСТИ ---
        function ensureConnectivity() {
            const connected = new Set();
            
            // Находим звезду с наибольшим количеством связей как стартовую
            let startStar = 0;
            let maxConnections = 0;
            state.stars.forEach((star, idx) => {
                if (star.connections.length > maxConnections) {
                    maxConnections = star.connections.length;
                    startStar = idx;
                }
            });
            connected.add(startStar);
            
            while (connected.size < state.stars.length) {
                let minDist = Infinity;
                let bestPair = null;
                
                for (let i of connected) {
                    for (let j = 0; j < state.stars.length; j++) {
                        if (connected.has(j)) continue;
                        
                        // СТРОГАЯ ПРОВЕРКА ЛИМИТА
                        if (state.stars[i].connections.length >= CONFIG.maxConnections ||
                            state.stars[j].connections.length >= CONFIG.maxConnections) {
                            continue;
                        }
                        
                        const d = Math.sqrt(
                            Math.pow(state.stars[i].x - state.stars[j].x, 2) + 
                            Math.pow(state.stars[i].y - state.stars[j].y, 2)
                        );
                        
                        if (d < minDist) {
                            minDist = d;
                            bestPair = [i, j];
                        }
                    }
                }
                
                if (bestPair) {
                    const [i, j] = bestPair;
                    if (!state.stars[i].connections.includes(j)) {
                        state.stars[i].connections.push(j);
                        state.stars[j].connections.push(i);
                    }
                    connected.add(j);
                } else {
                    // Если все звёзды достигли лимита — добавляем оставшиеся как есть
                    for (let j = 0; j < state.stars.length; j++) {
                        if (!connected.has(j)) {
                            connected.add(j);
                        }
                    }
                    break;
                }
            }
        }

        function generateMap() {
            try {
                state.stars = [];
                state.virtualStars = [];
                state.boundaryEdges = [];
                const w = canvas.width;
                const h = canvas.height;
                const padding = CONFIG.boundaryMargin + 20;

                const sectorColors = [
                    'rgba(90, 60, 50, 0.22)',
                    'rgba(50, 60, 90, 0.22)',
                    'rgba(50, 90, 60, 0.22)',
                    'rgba(90, 90, 50, 0.22)',
                    'rgba(90, 50, 50, 0.22)',
                    'rgba(60, 50, 90, 0.22)'
                ];

                let attempts = 0;
                while (state.stars.length < CONFIG.starCount && attempts < 3000) {
                    const x = Math.random() * (w - padding * 2) + padding;
                    const y = Math.random() * (h - padding * 2) + padding;
                    
                    let tooClose = false;
                    for (let star of state.stars) {
                        const dist = Math.sqrt(Math.pow(star.x - x, 2) + Math.pow(star.y - y, 2));
                        if (dist < CONFIG.minStarDistance) {
                            tooClose = true;
                            break;
                        }
                    }
                    if (!tooClose) {
                        const star = new Star(state.stars.length, x, y, false);
                        star.sectorColor = sectorColors[state.stars.length % sectorColors.length];
                        state.stars.push(star);
                    }
                    attempts++;
                }

                for (let i = 0; i < CONFIG.virtualStarCount; i++) {
                    const side = Math.floor(Math.random() * 4);
                    let x, y;
                    const spread = 10;
                    
                    switch(side) {
                        case 0: x = Math.random() * w; y = -spread - Math.random() * CONFIG.virtualStarDistance; break;
                        case 1: x = w + spread + Math.random() * CONFIG.virtualStarDistance; y = Math.random() * h; break;
                        case 2: x = Math.random() * w; y = h + spread + Math.random() * CONFIG.virtualStarDistance; break;
                        case 3: x = -spread - Math.random() * CONFIG.virtualStarDistance; y = Math.random() * h; break;
                    }
                    
                    state.virtualStars.push(new Star(state.stars.length + i, x, y, true));
                }

                console.log(`Generated ${state.stars.length} real stars, ${state.virtualStars.length} virtual stars`);
                
                computeVoronoi();
                
                const validCells = state.stars.filter(s => s.voronoiCell && s.voronoiCell.length >= 3).length;
                console.log(`Voronoi: ${validCells} valid real cells, ${state.boundaryEdges.length} boundary edges`);
                console.log(`Map bounds: ${state.mapBounds.width}x${state.mapBounds.height}`);

                // НОВАЯ ФУНКЦИЯ ГЕНЕРАЦИИ СВЯЗЕЙ
                generateConnections();

                const playerStar = state.stars[Math.floor(Math.random() * state.stars.length)];
                playerStar.isPlayer = true;
                state.playerStarId = playerStar.id;

                let enemiesPlaced = 0;
                while(enemiesPlaced < 3) {
                    const s = state.stars[Math.floor(Math.random() * state.stars.length)];
                    if (!s.isPlayer && !s.hasEnemy) {
                        s.hasEnemy = true;
                        enemiesPlaced++;
                    }
                }

                // СБРОС КАМЕРЫ В НОЛЬ - карта будет центрирована автоматически
                camera.x = 0;
                camera.y = 0;
                camera.zoom = 1;
                updateZoomIndicator();

                console.log("Map generated successfully!");
            } catch (e) {
                console.error("Error generating map:", e);
            }
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            ctx.translate(-camera.x, -camera.y);

            state.stars.forEach(star => {
                if (!star.voronoiCell || star.voronoiCell.length < 3) return;
                
                ctx.fillStyle = star.sectorColor;
                ctx.strokeStyle = CONFIG.colors.sectorBorder;
                ctx.lineWidth = 1 / camera.zoom;
                
                ctx.beginPath();
                ctx.moveTo(star.voronoiCell[0].x, star.voronoiCell[0].y);
                for (let i = 1; i < star.voronoiCell.length; i++) {
                    ctx.lineTo(star.voronoiCell[i].x, star.voronoiCell[i].y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            });

            ctx.strokeStyle = CONFIG.colors.line;
            ctx.lineWidth = 1 / camera.zoom;
            ctx.beginPath();
            state.stars.forEach(star => {
                star.connections.forEach(connId => {
                    const target = state.stars.find(s => s.id === connId);
                    if (target) {
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(target.x, target.y);
                    }
                });
            });
            ctx.stroke();

            state.stars.forEach(star => {
                star.angle += 0.015;
                ctx.save();
                ctx.translate(star.x, star.y);

                ctx.globalAlpha = 0.25;
                ctx.save();
                ctx.rotate(star.angle);
                ctx.fillStyle = star.isPlayer ? CONFIG.colors.starActive : (star.hasEnemy ? '#d32f2f' : CONFIG.colors.star);
                const size = 5 / camera.zoom;
                ctx.fillRect(-size, -size, size * 2, size * 2);
                ctx.restore();

                ctx.globalAlpha = 1.0;
                ctx.fillStyle = star.isPlayer ? '#fff' : (star.hasEnemy ? '#ff5252' : '#ccc');
                const centerSize = 3 / camera.zoom;
                ctx.fillRect(-centerSize, -centerSize, centerSize * 2, centerSize * 2);
                ctx.restore();
            });

            ctx.restore();

            drawDeepSpace();
        }

        function gameLoop() {
            if (state.isRunning) {
                state.time += 0.05;
                drawMap();
            }
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (state.isRunning) return;
            state.isRunning = true;
            startScreen.style.display = 'none';
            statusLight.classList.add('active');
            sysStatusText.innerText = "ONLINE";
            sysStatusText.style.color = "#00e676";
            resizeCanvas();
            generateBackgroundStars();
            generateMap();
            drawMap();
            requestAnimationFrame(gameLoop);
            console.log("Game started!");
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!state.isRunning) startGame();
                else console.log("Turn executed");
            }
        });

        startScreen.addEventListener('click', () => {
            if (!state.isRunning) startGame();
        });

        console.log("Script loaded, waiting for input...");
        resizeCanvas();
    </script>
</body>
