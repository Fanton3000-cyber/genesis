<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Project: Rusty Core - Stellar Navigation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: #8c8c8c;
            user-select: none;
        }

        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 50% 50%, #2a2a2a 0%, #050505 100%),
                repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, #0f0f0f 4px, #0f0f0f 6px);
        }
        .background::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .game-interface {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 650px;
            z-index: 10;
            background-color: #141414;
            border: 4px solid #3e2723;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                inset 0 0 50px rgba(0, 0, 0, 0.9),
                0 0 10px rgba(62, 39, 35, 0.5);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .bolt {
            position: absolute; width: 12px; height: 12px;
            background: radial-gradient(circle, #5d4037 30%, #1a1a1a 100%);
            border-radius: 50%; border: 1px solid #222;
        }
        .tl { top: -8px; left: -8px; } .tr { top: -8px; right: -8px; }
        .bl { bottom: -8px; left: -8px; } .br { bottom: -8px; right: -8px; }

        .header {
            border-bottom: 2px solid #3e2723;
            padding-bottom: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 14px; color: #a1887f;
            text-shadow: 0 0 5px rgba(161, 136, 127, 0.3);
        }

        .status-light {
            width: 10px; height: 10px;
            background-color: #ff3d00;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #ff3d00;
            transition: all 0.5s ease;
        }
        .status-light.active {
            background-color: #00e676;
            box-shadow: 0 0 8px #00e676;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }

        #game-container {
            flex-grow: 1;
            background-color: #0b0e0b;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); 
            animation: led-pulse 4s infinite ease-in-out;
            cursor: grab;
        }
        
        #game-container:active {
            cursor: grabbing;
        }

        @keyframes led-pulse {
            0% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
            50% { box-shadow: inset 0 0 90px rgba(0, 255, 100, 0.1); }
            100% { box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.05); }
        }

        canvas {
            display: block; width: 100%; height: 100%;
        }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 5;
        }
        
        .zoom-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 5px 10px;
            font-size: 12px;
            color: #8c8c8c;
            z-index: 15;
            pointer-events: none;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; text-align: center;
        }
        h1 { color: #d7ccc8; text-shadow: 0 0 10px #ff5722; font-size: 32px; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 14px; color: #888; max-width: 400px; line-height: 1.5; }
        
        .star-slider-container {
            margin: 30px 0;
            text-align: center;
        }
        .star-slider-container label {
            display: block;
            color: #a1887f;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .star-slider {
            width: 300px;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: #3e2723;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        .star-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #ff5722;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ff5722;
        }
        .star-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #ff5722;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ff5722;
            border: none;
        }
        .star-count-display {
            margin-top: 15px;
            font-size: 24px;
            color: #ff5722;
            font-weight: bold;
            text-shadow: 0 0 10px #ff5722;
        }
        .star-legend {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
            justify-content: center;
        }
        .star-legend span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .star-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .start-button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00e676;
            background: transparent;
            border: 2px solid #00e676;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px #00e676;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
        }
        .start-button:hover {
            background: rgba(0, 230, 118, 0.1);
            box-shadow: 0 0 40px rgba(0, 230, 118, 0.5);
            transform: scale(1.05);
        }
        .start-button:active {
            transform: scale(0.98);
        }
        .start-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading-indicator {
            display: none;
            margin-top: 20px;
            color: #00e676;
            font-size: 14px;
            animation: blink 0.5s infinite;
        }
        
        .or-divider {
            margin: 20px 0;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="game-interface">
        <div class="bolt tl"></div><div class="bolt tr"></div>
        <div class="bolt bl"></div><div class="bolt br"></div>

        <div class="header">
            <span>System: <span id="sys-status" style="color: #ff5722;">OFFLINE</span></span>
            <span>Hull Integrity: <span id="hull-status">100%</span></span>
            <span>Status: <div id="status-light" class="status-light"></div></span>
        </div>

        <div id="game-container">
            <div class="vignette"></div>
            <canvas id="gameCanvas"></canvas>
            <div class="zoom-indicator" id="zoom-indicator">Zoom: 100%</div>
            
            <div id="start-screen">
                <h1>Rusty Core</h1>
                <p>Навигационная система готова.<br>Сектора загружены. Враги обнаружены.</p>
                
                <div class="star-slider-container">
                    <label>Количество звёзд в секторе</label>
                    <input type="range" min="20" max="260" value="50" class="star-slider" id="starSlider">
                    <div class="star-count-display" id="starCountDisplay">50 звёзд</div>
                </div>
                
                <div class="star-legend">
                    <span><div class="star-dot" style="background: #ff6b6b;"></div> Красные (25%)</span>
                    <span><div class="star-dot" style="background: #6bb6ff;"></div> Синие (15%)</span>
                    <span><div class="star-dot" style="background: #ffd966;"></div> Жёлтые (60%)</span>
                </div>
                
                <div class="or-divider">— или —</div>
                
                <button class="start-button" id="startButton">ЗАПУСК</button>
                
                <div class="loading-indicator" id="loadingIndicator">Генерация сектора...</div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            virtualStarCount: 100,
            minStarDistance: 50,
            maxConnections: 5,
            connectionRange: 280,
            boundaryMargin: 100,
            virtualStarDistance: 20,
            maxRouteIntersections: 0, // НОЛЬ пересечений! (было 1)
            mapShapePoints: { min: 7, max: 14 },
            mapShapeIrregularity: 0.5,
            mapUniverseSize: 3000, // Разумный размер (было 8000)
            starYellow: 0.60,
            starRed: 0.25,
            starBlue: 0.15,
            colors: {
                starActive: '#ff9800',
                starRed: '#ff6b6b',
                starBlue: '#6bb6ff',
                starYellow: '#ffd966',
                line: '#555',
                lineBright: '#888',
                sectorBorder: 'rgba(140, 140, 140, 0.3)',
                deepSpace: 'rgba(3, 5, 10, 0.95)',
                boundaryLine: 'rgba(120, 160, 200, 0.4)'
            }
        };

        const camera = {
            x: 0,
            y: 0,
            zoom: 1,
            minZoom: 0.4, // ОГРАНИЧЕНО - нельзя увидеть всю карту (было 0.15)
            maxZoom: 4,
            isDragging: false,
            lastMouseX: 0,
            lastMouseY: 0
        };

        class Star {
            constructor(id, x, y, isVirtual = false) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.isVirtual = isVirtual;
                this.connections = [];
                this.isPlayer = false;
                this.sectorColor = '';
                this.voronoiCell = [];
                this.angle = Math.random() * Math.PI * 2;
                this.brightness = 0.7 + Math.random() * 0.3;
                this.starType = 'yellow';
            }
        }

        const state = {
            isRunning: false,
            isGenerating: false,
            stars: [],
            virtualStars: [],
            playerStarId: null,
            hull: 100,
            time: 0,
            bgStars: [],
            boundaryEdges: [],
            mapBounds: { minX: 0, maxX: 0, minY: 0, maxY: 0, width: 0, height: 0 },
            routeLines: [],
            sectorColors: [],
            starCount: 50,
            mapShapePolygon: [],
            universeBounds: { minX: 0, maxX: 0, minY: 0, maxY: 0 }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const startButton = document.getElementById('startButton');
        const statusLight = document.getElementById('status-light');
        const sysStatusText = document.getElementById('sys-status');
        const zoomIndicator = document.getElementById('zoom-indicator');
        const gameContainer = document.getElementById('game-container');
        const starSlider = document.getElementById('starSlider');
        const starCountDisplay = document.getElementById('starCountDisplay');
        const loadingIndicator = document.getElementById('loadingIndicator');

        starSlider.addEventListener('input', () => {
            state.starCount = parseInt(starSlider.value);
            starCountDisplay.textContent = `${state.starCount} звёзд`;
        });

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function generateBackgroundStars() {
            state.bgStars = [];
            const count = 400;
            const bounds = state.universeBounds;
            const width = bounds.maxX - bounds.minX;
            const height = bounds.maxY - bounds.minY;
            
            for (let i = 0; i < count; i++) {
                state.bgStars.push({
                    x: bounds.minX + Math.random() * width,
                    y: bounds.minY + Math.random() * height,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: 0.2 + Math.random() * 0.4,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        function getLineIntersection(p1, p2, p3, p4) {
            const det = (p2.x - p1.x) * (p4.y - p3.y) - (p4.x - p3.x) * (p2.y - p1.y);
            if (det === 0) return false;
            const lambda = ((p4.y - p3.y) * (p4.x - p1.x) + (p3.x - p4.x) * (p4.y - p1.y)) / det;
            const gamma = ((p1.y - p2.y) * (p4.x - p1.x) + (p2.x - p1.x) * (p4.y - p1.y)) / det;
            return (0 < lambda && lambda < 1) && (0 < gamma && gamma < 1);
        }

        function countIntersections(newLine, existingLines) {
            let count = 0;
            for (let line of existingLines) {
                if (line.p1.id === newLine.p1.id || line.p1.id === newLine.p2.id ||
                    line.p2.id === newLine.p1.id || line.p2.id === newLine.p2.id) continue;
                if (getLineIntersection(
                    {x: newLine.p1.x, y: newLine.p1.y},
                    {x: newLine.p2.x, y: newLine.p2.y},
                    {x: line.p1.x, y: line.p1.y},
                    {x: line.p2.x, y: line.p2.y}
                )) count++;
            }
            return count;
        }

        function updateZoomIndicator() {
            zoomIndicator.textContent = `Zoom: ${Math.round(camera.zoom * 100)}%`;
        }

        function screenToWorld(screenX, screenY) {
            return {
                x: (screenX - canvas.width / 2) / camera.zoom + canvas.width / 2 + camera.x,
                y: (screenY - canvas.height / 2) / camera.zoom + canvas.height / 2 + camera.y
            };
        }

        gameContainer.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                camera.isDragging = true;
                camera.lastMouseX = e.clientX;
                camera.lastMouseY = e.clientY;
                gameContainer.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (camera.isDragging) {
                camera.x -= (e.clientX - camera.lastMouseX) / camera.zoom;
                camera.y -= (e.clientY - camera.lastMouseY) / camera.zoom;
                clampCamera();
                camera.lastMouseX = e.clientX;
                camera.lastMouseY = e.clientY;
            }
        });

        window.addEventListener('mouseup', () => {
            camera.isDragging = false;
            gameContainer.style.cursor = 'grab';
        });

        function clampCamera() {
            const bounds = state.universeBounds;
            const padding = 100;
            const viewWidth = canvas.width / camera.zoom;
            const viewHeight = canvas.height / camera.zoom;
            
            const minX = bounds.minX - padding + viewWidth / 2 - canvas.width / 2;
            const maxX = bounds.maxX + padding - viewWidth / 2 - canvas.width / 2;
            const minY = bounds.minY - padding + viewHeight / 2 - canvas.height / 2;
            const maxY = bounds.maxY + padding - viewHeight / 2 - canvas.height / 2;
            
            camera.x = Math.max(minX, Math.min(maxX, camera.x));
            camera.y = Math.max(minY, Math.min(maxY, camera.y));
        }

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = -e.deltaY * 0.001;
            const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * (1 + delta)));
            
            const rect = canvas.getBoundingClientRect();
            const worldPosBefore = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
            camera.zoom = newZoom;
            const worldPosAfter = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
            
            camera.x += worldPosBefore.x - worldPosAfter.x;
            camera.y += worldPosBefore.y - worldPosAfter.y;
            
            clampCamera();
            updateZoomIndicator();
        }, { passive: false });

        function isPointInPolygon(point, polygon) {
            if (polygon.length < 3) return true;
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                const intersect = ((yi > point.y) !== (yj > point.y)) &&
                    (point.x < (xj - xi) * (point.y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function generateUniverseShape() {
            const centerX = 0;
            const centerY = 0;
            const universeSize = CONFIG.mapUniverseSize;
            const baseRadius = universeSize / 2;
            const numPoints = Math.floor(Math.random() * 
                (CONFIG.mapShapePoints.max - CONFIG.mapShapePoints.min + 1)) + 
                CONFIG.mapShapePoints.min;
            
            const irregularity = CONFIG.mapShapeIrregularity;
            const polygon = [];
            
            for (let i = 0; i < numPoints; i++) {
                const baseAngle = (Math.PI * 2 * i / numPoints);
                const radiusVariation = 0.7 + Math.random() * 0.3 * irregularity;
                const radius = baseRadius * radiusVariation;
                const angleVariation = (Math.random() - 0.5) * irregularity * 0.5;
                
                polygon.push({
                    x: centerX + Math.cos(baseAngle + angleVariation) * radius,
                    y: centerY + Math.sin(baseAngle + angleVariation) * radius
                });
            }
            
            polygon.sort((a, b) => {
                const angleA = Math.atan2(a.y - centerY, a.x - centerX);
                const angleB = Math.atan2(b.y - centerY, b.x - centerX);
                return angleA - angleB;
            });
            
            state.mapShapePolygon = polygon;
            
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            polygon.forEach(p => {
                minX = Math.min(minX, p.x);
                maxX = Math.max(maxX, p.x);
                minY = Math.min(minY, p.y);
                maxY = Math.max(maxY, p.y);
            });
            
            const padding = 100;
            state.universeBounds = {
                minX: minX - padding,
                maxX: maxX + padding,
                minY: minY - padding,
                maxY: maxY + padding
            };
            
            console.log(`Universe: ${numPoints} vertices, ${state.universeBounds.maxX - state.universeBounds.minX}x${state.universeBounds.maxY - state.universeBounds.minY}px`);
        }

        function drawDeepSpace() {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            ctx.translate(-camera.x, -camera.y);
            
            state.bgStars.forEach(star => {
                const twinkle = 0.5 + 0.5 * Math.sin(state.time * 0.5 + star.twinkle);
                ctx.fillStyle = `rgba(200, 220, 255, ${star.alpha * twinkle})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size / camera.zoom, 0, Math.PI * 2);
                ctx.fill();
            });
            
            if (state.boundaryEdges.length > 0) {
                ctx.strokeStyle = CONFIG.colors.boundaryLine;
                ctx.lineWidth = 1.5 / camera.zoom;
                ctx.setLineDash([5 / camera.zoom, 4 / camera.zoom]);
                ctx.beginPath();
                state.boundaryEdges.forEach(edge => {
                    ctx.moveTo(edge.start.x, edge.start.y);
                    ctx.lineTo(edge.end.x, edge.end.y);
                });
                ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.restore();
        }

        function computeVoronoi() {
            const bounds = state.universeBounds;
            const allStars = [...state.stars, ...state.virtualStars];

            allStars.forEach(star => {
                star.voronoiCell = [
                    {x: bounds.minX - 1000, y: bounds.minY - 1000},
                    {x: bounds.maxX + 1000, y: bounds.minY - 1000},
                    {x: bounds.maxX + 1000, y: bounds.maxY + 1000},
                    {x: bounds.minX - 1000, y: bounds.maxY + 1000}
                ];
            });

            allStars.forEach(star => {
                allStars.forEach(other => {
                    if (star === other) return;
                    clipCellByBisector(star, other);
                });
            });

            buildBoundaryFromEdges(allStars);
            
            if (state.boundaryEdges.length > 0) {
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                state.boundaryEdges.forEach(edge => {
                    minX = Math.min(minX, edge.start.x, edge.end.x);
                    maxX = Math.max(maxX, edge.start.x, edge.end.x);
                    minY = Math.min(minY, edge.start.y, edge.end.y);
                    maxY = Math.max(maxY, edge.start.y, edge.end.y);
                });
                state.mapBounds = { minX, maxX, minY, maxY, width: maxX - minX, height: maxY - minY };
            }
        }

        function buildBoundaryFromEdges(allStars) {
            state.boundaryEdges = [];
            const edgeSet = new Set();
            
            state.stars.forEach(realStar => {
                if (!realStar.voronoiCell || realStar.voronoiCell.length < 3) return;
                for (let i = 0; i < realStar.voronoiCell.length; i++) {
                    const p1 = realStar.voronoiCell[i];
                    const p2 = realStar.voronoiCell[(i + 1) % realStar.voronoiCell.length];
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    
                    let nearestStar = null;
                    let nearestDist = Infinity;
                    
                    allStars.forEach(other => {
                        if (other === realStar) return;
                        const d = Math.sqrt(Math.pow(other.x - midX, 2) + Math.pow(other.y - midY, 2));
                        if (d < nearestDist) { nearestDist = d; nearestStar = other; }
                    });
                    
                    if (nearestStar && nearestStar.isVirtual) {
                        const key = `${Math.round(p1.x)},${Math.round(p1.y)}-${Math.round(p2.x)},${Math.round(p2.y)}`;
                        if (!edgeSet.has(key)) {
                            edgeSet.add(key);
                            state.boundaryEdges.push({ start: p1, end: p2 });
                        }
                    }
                }
            });
        }

        function clipCellByBisector(star, other) {
            const midX = (star.x + other.x) / 2;
            const midY = (star.y + other.y) / 2;
            const nx = star.x - other.x;
            const ny = star.y - other.y;
            const newCell = [];
            const cell = star.voronoiCell;
            if (cell.length === 0) return;

            for (let i = 0; i < cell.length; i++) {
                const curr = cell[i];
                const next = cell[(i + 1) % cell.length];
                const currDist = (curr.x - midX) * nx + (curr.y - midY) * ny;
                const nextDist = (next.x - midX) * nx + (next.y - midY) * ny;
                
                if (currDist >= -0.001) newCell.push({x: curr.x, y: curr.y});
                
                if ((currDist >= -0.001 && nextDist < -0.001) || (currDist < -0.001 && nextDist >= -0.001)) {
                    const t = currDist / (currDist - nextDist);
                    newCell.push({
                        x: curr.x + t * (next.x - curr.x),
                        y: curr.y + t * (next.y - curr.y)
                    });
                }
            }
            star.voronoiCell = newCell;
        }

        function generateConnections() {
            state.stars.forEach(star => star.connections = []);
            state.routeLines = [];

            state.stars.forEach(star => {
                const neighbors = [];
                state.stars.forEach(other => {
                    if (star === other) return;
                    const dx = other.x - star.x;
                    const dy = other.y - star.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONFIG.connectionRange && dist > 0) {
                        neighbors.push({ star: other, dist, angle: Math.atan2(dy, dx) });
                    }
                });
                
                neighbors.sort((a, b) => a.dist - b.dist);
                const sectors = new Map();
                const sectorSize = Math.PI / 4;
                
                neighbors.forEach(neighbor => {
                    let sectorIndex = Math.floor((neighbor.angle + Math.PI) / sectorSize);
                    sectorIndex = Math.max(0, Math.min(7, sectorIndex));
                    if (!sectors.has(sectorIndex)) sectors.set(sectorIndex, neighbor);
                });
                
                Array.from(sectors.values())
                    .sort((a, b) => a.dist - b.dist)
                    .slice(0, CONFIG.maxConnections)
                    .forEach(neighbor => {
                        if (star.connections.length >= CONFIG.maxConnections ||
                            neighbor.star.connections.length >= CONFIG.maxConnections) return;
                        
                        const newLine = { p1: star, p2: neighbor.star };
                        // ПРОВЕРКА: 0 пересечений (строгое правило)
                        if (countIntersections(newLine, state.routeLines) <= CONFIG.maxRouteIntersections) {
                            if (!star.connections.includes(neighbor.star.id)) {
                                star.connections.push(neighbor.star.id);
                                neighbor.star.connections.push(star.id);
                                state.routeLines.push(newLine);
                            }
                        }
                    });
            });

            ensureConnectivity();
        }

        function ensureConnectivity() {
            const connected = new Set([0]);
            while (connected.size < state.stars.length) {
                let minDist = Infinity;
                let bestPair = null;
                
                for (let i of connected) {
                    for (let j = 0; j < state.stars.length; j++) {
                        if (connected.has(j)) continue;
                        if (state.stars[i].connections.length >= CONFIG.maxConnections ||
                            state.stars[j].connections.length >= CONFIG.maxConnections) continue;
                        
                        const d = Math.sqrt(Math.pow(state.stars[i].x - state.stars[j].x, 2) + 
                                           Math.pow(state.stars[i].y - state.stars[j].y, 2));
                        if (d < minDist) { minDist = d; bestPair = [i, j]; }
                    }
                }
                
                if (bestPair) {
                    const [i, j] = bestPair;
                    
                    // ПРОВЕРКА: 0 пересечений даже для обязательных связей
                    const newLine = { p1: state.stars[i], p2: state.stars[j] };
                    if (countIntersections(newLine, state.routeLines) <= CONFIG.maxRouteIntersections) {
                        if (!state.stars[i].connections.includes(j)) {
                            state.stars[i].connections.push(j);
                            state.stars[j].connections.push(i);
                            state.routeLines.push(newLine);
                        }
                    }
                    connected.add(j);
                } else break;
            }
        }

        function generateStarsInUniverse() {
            const polygon = state.mapShapePolygon;
            const bounds = state.universeBounds;
            
            if (polygon.length < 3) return;
            
            const insideCount = Math.floor(state.starCount * 0.8);
            const outsideCount = state.starCount - insideCount;
            
            let attempts = 0;
            const maxAttempts = state.starCount * 500;
            
            while (state.stars.length < insideCount && attempts < maxAttempts) {
                const x = bounds.minX + Math.random() * (bounds.maxX - bounds.minX);
                const y = bounds.minY + Math.random() * (bounds.maxY - bounds.minY);
                
                if (!isPointInPolygon({x, y}, polygon)) {
                    attempts++;
                    continue;
                }
                
                let tooClose = false;
                for (let star of state.stars) {
                    const dist = Math.sqrt(Math.pow(star.x - x, 2) + Math.pow(star.y - y, 2));
                    if (dist < CONFIG.minStarDistance) {
                        tooClose = true;
                        break;
                    }
                }
                
                if (!tooClose) {
                    state.stars.push(new Star(state.stars.length, x, y, false));
                }
                
                attempts++;
            }
            
            const outsideSpread = 150;
            while (state.stars.length < state.starCount && attempts < maxAttempts * 2) {
                const edgeIndex = Math.floor(Math.random() * polygon.length);
                const p1 = polygon[edgeIndex];
                const p2 = polygon[(edgeIndex + 1) % polygon.length];
                
                const t = Math.random();
                const edgeX = p1.x + (p2.x - p1.x) * t;
                const edgeY = p1.y + (p2.y - p1.y) * t;
                
                const angle = Math.atan2(edgeY, edgeX);
                const spread = (Math.random() - 0.2) * outsideSpread;
                
                const x = edgeX + Math.cos(angle) * spread;
                const y = edgeY + Math.sin(angle) * spread;
                
                let tooClose = false;
                for (let star of state.stars) {
                    const dist = Math.sqrt(Math.pow(star.x - x, 2) + Math.pow(star.y - y, 2));
                    if (dist < CONFIG.minStarDistance * 0.7) {
                        tooClose = true;
                        break;
                    }
                }
                
                if (!tooClose) {
                    state.stars.push(new Star(state.stars.length, x, y, false));
                }
                
                attempts++;
            }
            
            console.log(`Generated ${state.stars.length} stars`);
        }

        function assignStarTypes() {
            const totalStars = state.stars.length;
            let redCount = Math.max(1, Math.floor(totalStars * CONFIG.starRed));
            let blueCount = Math.max(1, Math.floor(totalStars * CONFIG.starBlue));
            let yellowCount = totalStars - redCount - blueCount;
            
            const types = [];
            for (let i = 0; i < redCount; i++) types.push('red');
            for (let i = 0; i < blueCount; i++) types.push('blue');
            for (let i = 0; i < yellowCount; i++) types.push('yellow');
            
            for (let i = types.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [types[i], types[j]] = [types[j], types[i]];
            }
            
            state.stars.forEach((star, i) => star.starType = types[i]);
        }

        function generateMap() {
            try {
                state.stars = [];
                state.virtualStars = [];
                state.boundaryEdges = [];
                state.routeLines = [];

                state.sectorColors = [
                    'rgba(90, 60, 50, 0.20)',
                    'rgba(50, 60, 90, 0.20)',
                    'rgba(50, 90, 60, 0.20)',
                    'rgba(90, 90, 50, 0.20)',
                    'rgba(90, 50, 50, 0.20)',
                    'rgba(60, 50, 90, 0.20)'
                ];

                generateUniverseShape();
                generateStarsInUniverse();
                assignStarTypes();

                const bounds = state.universeBounds;
                for (let i = 0; i < CONFIG.virtualStarCount; i++) {
                    const side = Math.floor(Math.random() * 4);
                    let x, y, spread = 50;
                    switch(side) {
                        case 0: x = bounds.minX + Math.random() * (bounds.maxX - bounds.minX); y = bounds.minY - spread - Math.random() * CONFIG.virtualStarDistance; break;
                        case 1: x = bounds.maxX + spread + Math.random() * CONFIG.virtualStarDistance; y = bounds.minY + Math.random() * (bounds.maxY - bounds.minY); break;
                        case 2: x = bounds.minX + Math.random() * (bounds.maxX - bounds.minX); y = bounds.maxY + spread + Math.random() * CONFIG.virtualStarDistance; break;
                        case 3: x = bounds.minX - spread - Math.random() * CONFIG.virtualStarDistance; y = bounds.minY + Math.random() * (bounds.maxY - bounds.minY); break;
                    }
                    state.virtualStars.push(new Star(state.stars.length + i, x, y, true));
                }

                computeVoronoi();
                generateConnections();

                const playerStar = state.stars[Math.floor(Math.random() * state.stars.length)];
                playerStar.isPlayer = true;
                state.playerStarId = playerStar.id;

                camera.x = 0;
                camera.y = 0;
                camera.zoom = 1;
                updateZoomIndicator();

                console.log("Map generated!");
            } catch (e) {
                console.error("Error:", e);
            }
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            ctx.translate(-camera.x, -camera.y);

            state.stars.forEach(star => {
                if (!star.voronoiCell || star.voronoiCell.length < 3) return;
                ctx.fillStyle = star.sectorColor;
                ctx.strokeStyle = CONFIG.colors.sectorBorder;
                ctx.lineWidth = 1 / camera.zoom;
                ctx.beginPath();
                ctx.moveTo(star.voronoiCell[0].x, star.voronoiCell[0].y);
                for (let i = 1; i < star.voronoiCell.length; i++)
                    ctx.lineTo(star.voronoiCell[i].x, star.voronoiCell[i].y);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            });

            ctx.lineWidth = 1.5 / camera.zoom;
            state.stars.forEach(star => {
                star.connections.forEach(connId => {
                    const target = state.stars.find(s => s.id === connId);
                    if (target) {
                        const brightness = (star.brightness + target.brightness) / 2;
                        let lineColor = CONFIG.colors.line;
                        if (star.isPlayer || target.isPlayer) lineColor = CONFIG.colors.starActive;
                        else if (brightness > 0.85) lineColor = CONFIG.colors.lineBright;
                        
                        ctx.strokeStyle = lineColor;
                        ctx.globalAlpha = 0.5 + brightness * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(target.x, target.y);
                        ctx.stroke();
                        ctx.globalAlpha = 1.0;
                    }
                });
            });

            state.stars.forEach(star => {
                star.angle += 0.015;
                ctx.save();
                ctx.translate(star.x, star.y);

                ctx.globalAlpha = 0.25;
                ctx.save();
                ctx.rotate(star.angle);
                if (star.starType === 'red') ctx.fillStyle = CONFIG.colors.starRed;
                else if (star.starType === 'blue') ctx.fillStyle = CONFIG.colors.starBlue;
                else ctx.fillStyle = CONFIG.colors.starYellow;
                const size = 5 / camera.zoom;
                ctx.fillRect(-size, -size, size * 2, size * 2);
                ctx.restore();

                ctx.globalAlpha = 1.0;
                if (star.isPlayer) ctx.fillStyle = '#fff';
                else if (star.starType === 'red') ctx.fillStyle = CONFIG.colors.starRed;
                else if (star.starType === 'blue') ctx.fillStyle = CONFIG.colors.starBlue;
                else ctx.fillStyle = CONFIG.colors.starYellow;
                const centerSize = 3 / camera.zoom;
                ctx.fillRect(-centerSize, -centerSize, centerSize * 2, centerSize * 2);
                ctx.restore();
            });

            ctx.restore();
            drawDeepSpace();
        }

        function gameLoop() {
            if (state.isRunning) {
                state.time += 0.05;
                drawMap();
            }
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (state.isRunning || state.isGenerating) return;
            
            state.isGenerating = true;
            loadingIndicator.style.display = 'block';
            startButton.disabled = true;
            startButton.textContent = 'ГЕНЕРАЦИЯ...';
            starSlider.disabled = true;
            
            setTimeout(() => {
                state.isRunning = true;
                state.isGenerating = false;
                startScreen.style.display = 'none';
                statusLight.classList.add('active');
                sysStatusText.innerText = "ONLINE";
                sysStatusText.style.color = "#00e676";
                resizeCanvas();
                generateMap();
                generateBackgroundStars();
                drawMap();
                requestAnimationFrame(gameLoop);
                console.log("Game started!");
            }, 100);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!state.isRunning && !state.isGenerating) startGame();
            }
        });

        startButton.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!state.isRunning && !state.isGenerating) startGame();
        });

        resizeCanvas();
    </script>
